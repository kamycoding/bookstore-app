<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookstore App</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>

  <body>
    <header class="hero-section">
      <div class="container">
        <div class="hero-layout hero-layout-centered">
          <div class="hero-content hero-content-centered">
            <h1 class="hero-title">
              Discover your
              <span class="hero-title-accent">next read</span>
            </h1>

            <form class="hero-search" role="search">
              <input
                class="input hero-search-input"
                type="search"
                name="search"
                placeholder="Search by title, author or genre..."
                aria-label="Search books"
              />

              <button
                class="button is-primary hero-search-button"
                type="button"
              >
                Search
              </button>
            </form>

            <a href="#bookList" class="hero-scroll-link"> Browse all books </a>
          </div>
        </div>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div id="bookList" class="columns is-multiline"></div>
      </div>
    </main>

    <script src="./js/books.js"></script>
    <script src="./js/templates.js"></script>
    <script src="./js/script.js"></script>
  </body>
</html>
